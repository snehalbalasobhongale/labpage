<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Structural Virology Lab</title>

<style>
:root {
  --bg: linear-gradient(135deg, #6a00ff, #4fc3f7);
  --text: white;
}

body {
  margin: 0;
  font-family: Arial;
  background: var(--bg);
  color: var(--text);
  overflow-x: hidden;
}

/* NAV */
nav {
  position: fixed;
  width: 100%;
  top: 0;
  display: flex;
  justify-content: center;
  gap: 30px;
  padding: 15px;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
}

nav a {
  color: white;
  text-decoration: none;
  font-weight: bold;
}

/* HERO */
#home {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
}

/* VIRUS */
.virus-container {
  position: relative;
  width: 300px;
  height: 300px;
  margin-top: 40px;
}

.virus {
  width: 100%;
  height: 100%;
  border: 2px solid white;
  border-radius: 50%;
  position: relative;
}

/* genome */
.genome {
  position: absolute;
  width: 80px;
  height: 80px;
  border: 2px dashed white;
  border-radius: 50%;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  cursor: pointer;
}

/* spikes */
.spike {
  position: absolute;
  width: 4px;
  height: 30px;
  background: white;
  top: -30px;
  left: 50%;
  transform-origin: bottom;
  cursor: pointer;
}

.spike::after {
  content: '';
  position: absolute;
  top: -6px;
  left: -4px;
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: white;
}

/* popup */
.popup {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(0,0,0,0.9);
  padding: 20px;
  border-radius: 10px;
  display: none;
  max-width: 400px;
  text-align: center;
}

.popup img {
  width: 100%;
  border-radius: 8px;
}

.close {
  margin-top: 10px;
  cursor: pointer;
  color: cyan;
}
</style>
</head>

<body>

<nav>
  <a href="#home">Home</a>
</nav>

<section id="home">
  <h1>Structural Virology Lab</h1>
  <p><b>Uncoating Enveloped Secrets</b></p>
  <p>Dr. Tirumal Kumar Chowdary</p>

  <!-- VIRUS -->
  <div class="virus-container">
    <div class="virus" id="virus"></div>
    <div class="genome" onclick="showGenome()"></div>
  </div>
</section>

<!-- POPUP -->
<div class="popup" id="popup">
  <div id="popupContent"></div>
  <div class="close" onclick="closePopup()">Close</div>
</div>

<script>
// CREATE SPIKES
const virus = document.getElementById("virus");

for(let i=0;i<20;i++){
  let spike = document.createElement("div");
  spike.className = "spike";

  let angle = (360/20)*i;
  spike.style.transform = `rotate(${angle}deg) translate(-50%)`;

  spike.onclick = showEnvelope;

  virus.appendChild(spike);
}

// SHOW ENVELOPE FUNCTION
function showEnvelope(){
  document.getElementById("popup").style.display = "block";
  document.getElementById("popupContent").innerHTML = `
    <h2>Viral Envelope Interaction</h2>
    <img src="https://upload.wikimedia.org/wikipedia/commons/6/6f/Coronavirus_spike.png">
    <p>Envelope proteins bind host receptors enabling viral entry.</p>
  `;
}

// SHOW GENOME FUNCTION
function showGenome(){
  document.getElementById("popup").style.display = "block";
  document.getElementById("popupContent").innerHTML = `
    <h2>Genome Replication & Packaging</h2>
    <img src="https://upload.wikimedia.org/wikipedia/commons/3/3f/Viral_replication_cycle.png">
    <p>Viral genome replicates and assembles into new virions.</p>
  `;
}

// CLOSE POPUP
function closePopup(){
  document.getElementById("popup").style.display = "none";
}
</script>

</body>
</html>
